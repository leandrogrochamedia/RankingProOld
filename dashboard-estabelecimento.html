<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#08080f">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranking Pro — Dashboard Estabelecimento</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width:520px;margin:48px auto;padding:0 20px;">
    <div class="card">
      <h1 style="margin:0 0 8px;">🏢 Dashboard Estabelecimento</h1>
      <p style="color:#64748b;margin:0 0 20px;">Fase 4 — equipe, nota média e últimas avaliações.</p>
      <p id="session-info" style="font-size:14px;color:#475569;"></p>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
        <a href="selecionar-perfil.html?forceProfileSelect=true" class="btn btn-outline" style="text-align:center;text-decoration:none;">Trocar de área</a>
        <button type="button" class="btn btn-outline" onclick="resetSessionAndGoHome()">Sair</button>
        <a href="index.html" style="text-align:center;font-size:14px;color:#6366f1;">← Início</a>
      </div>
    </div>
  </div>

  <script src="js/loader.js"></script>
  <script>
    document.addEventListener('scriptsLoaded', function () {
      const session = getSession();
      if (!session?.userId) {
        window.location.href = 'login.html?returnTo=dashboard-estabelecimento.html';
        return;
      }
      document.getElementById('session-info').textContent =
        (session.name || 'Estabelecimento') + (session.establishmentId ? ' · vínculo ativo' : ' · sem vínculo');
    });
  </script>
</body>
</html>
