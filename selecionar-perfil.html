<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#08080f" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🏆 Ranking Pro — Como entrar</title>
  <link rel="stylesheet" href="./base.css" />
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./proofly-glass.css" />
  <style>
    .profile-select-card-btn.is-hint {
      border-color: rgba(99, 102, 241, 0.55);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.25), 0 8px 24px rgba(99, 102, 241, 0.12);
    }
    .profile-select-hint-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body class="profile-select-page">

  <div id="userMessage" class="user-message" style="display:none;"></div>

  <main class="profile-select-shell">
    <div class="profile-select-card glass-surface">
      <span class="profile-select-eyebrow">🏆 Ranking Pro</span>
      <h1 id="profileSelectTitle">Carregando...</h1>
      <p class="profile-select-sub" id="profileSelectSub">Carregando suas opções…</p>
      <div id="profileCards" class="profile-select-grid" role="listbox" aria-label="Tipo de perfil">
        <div class="loading">Carregando...</div>
      </div>
    </div>
  </main>

  <script src="./loader.js"></script>
  <script>
    document.addEventListener('scriptsLoaded', async function() {
      const session = typeof getSession === 'function' ? getSession() : null;
      const force = isForceProfileSelect();
      const grid = document.getElementById('profileCards');
      const sub = document.getElementById('profileSelectSub');
      const title = document.getElementById('profileSelectTitle');
      const esc = typeof escapeHtml === 'function' ? escapeHtml : (s) => String(s || '');
      const hintType = typeof getProfileHintFromUrl === 'function' ? getProfileHintFromUrl() : null;

      if (!session?.userId) {
        const returnTo = getProfileSelectorUrl(force);
        window.location.href = `./login.html?returnTo=${encodeURIComponent(returnTo.replace('./', ''))}`;
        return;
      }

      if (!force && getActiveProfileType(session)) {
        redirectToActiveProfileHome(session);
        return;
      }

      let affiliations = { client: null, professional: null, establishment: null };
      let userForAff = session;
      if (typeof fetchUserById === 'function' && session.userId) {
        let freshUser = await fetchUserById(session.userId);
        if (freshUser && typeof prepareUserAfterAuth === 'function') {
          freshUser = await prepareUserAfterAuth(freshUser);
        }
        if (freshUser) {
          userForAff = { ...session, ...freshUser, userId: freshUser.id };
          if (typeof buildSessionFromUser === 'function') {
            const merged = buildSessionFromUser(freshUser, session);
            delete merged.activeProfile;
            setSession(merged);
          }
        }
      }
      if (typeof fetchUserAffiliations === 'function') {
        affiliations = await fetchUserAffiliations(userForAff);
      }
      const linkedCount = typeof countUserAffiliations === 'function'
        ? countUserAffiliations(affiliations)
        : 0;
      let options = buildProfileEntryOptions(affiliations);

      if (hintType) {
        options = [...options].sort((a, b) => {
          const ah = a.type === hintType ? 0 : 1;
          const bh = b.type === hintType ? 0 : 1;
          return ah - bh;
        });
      }

      if (force) {
        title.textContent = 'Trocar de área';
        sub.textContent = session.name
          ? `Olá, ${session.name} — escolha onde entrar agora`
          : 'Escolha onde entrar agora';
      } else if (hintType && PROFILE_TYPES[hintType]) {
        title.textContent = `Entrar como ${PROFILE_TYPES[hintType].label}`;
        sub.textContent = 'Sugerimos a área que você escolheu — confirme ou troque abaixo';
      } else if (linkedCount > 1) {
        title.textContent = 'Onde você quer entrar?';
        sub.textContent = 'Encontramos mais de uma área vinculada à sua conta';
      } else if (linkedCount === 1) {
        title.textContent = 'Bem-vindo de volta';
        sub.textContent = 'Confirme como deseja entrar agora';
      } else {
        title.textContent = 'Quem é você?';
        sub.textContent = 'Ainda não identificamos seu perfil — escolha uma área';
      }

      grid.innerHTML = '';
      options.forEach((opt) => {
        const card = document.createElement('button');
        const isHint = hintType && opt.type === hintType;
        card.type = 'button';
        card.className = 'profile-select-card-btn'
          + (opt.linked ? ' is-linked' : '')
          + (opt.badgeRole === 'owner' ? ' is-owner' : '')
          + (isHint ? ' is-hint' : '');
        card.setAttribute('role', 'option');
        card.innerHTML = `
          <span class="profile-select-icon">${opt.icon}</span>
          <span class="profile-select-text">
            <strong>${esc(opt.title)}</strong>
            <small>${esc(opt.subtitle)}</small>
            ${isHint ? '<span class="profile-select-hint-tag">Sugerido</span>' : ''}
            ${opt.badge ? `<span class="profile-select-badge${opt.badgeRole ? ' profile-select-badge-' + opt.badgeRole : ''}">${esc(opt.badge)}</span>` : ''}
          </span>
          <span class="profile-select-chevron" aria-hidden="true">›</span>
        `;
        card.addEventListener('click', () => {
          card.classList.add('is-selecting');
          selectAffiliationAndGo(opt);
        });
        grid.appendChild(card);
      });
    });
  </script>
</body>
</html>
