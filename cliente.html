<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#08080f">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranking Pro — Cliente</title>
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./proofly-glass.css">
  <link rel="stylesheet" href="./nucleus.css">
</head>
<body class="cliente-page">
  <div class="nucleus-shell nucleus-shell--wide" style="max-width:820px;margin:0 auto;padding:24px 16px;">
    <div class="glass-discovery-shell nucleus-glass">
      <p class="nucleus-eyebrow">Hub cliente</p>
      <h1 class="nucleus-title">Encontre profissionais de confiança</h1>
      <p class="nucleus-subtitle">Fase 3 — busca por especialidade/cidade, QR scanner e drawer de perfil.</p>
      <p class="nucleus-meta" id="session-info"></p>
      <div class="home-splash-actions" style="margin-top:16px;">
        <a href="./index.html" class="home-splash-btn home-splash-btn--secondary">← Voltar ao início</a>
        <a href="./login.html" class="home-splash-btn home-splash-btn--primary" id="btn-entrar">Entrar</a>
      </div>
    </div>
  </div>
  <script src="./loader.js"></script>
  <script>
    document.addEventListener('scriptsLoaded', function () {
      var session = getSession();
      var info = document.getElementById('session-info');
      var btn = document.getElementById('btn-entrar');
      if (session && session.userId) {
        info.textContent = 'Logado como ' + (session.name || session.email);
        btn.href = './selecionar-perfil.html?forceProfileSelect=true';
        btn.textContent = 'Trocar área';
      }
    });
  </script>
</body>
</html>
