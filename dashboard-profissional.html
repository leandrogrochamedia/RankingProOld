<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#08080f">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranking Pro — Dashboard Profissional</title>
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container" style="max-width:520px;margin:48px auto;padding:0 20px;">
    <div class="card">
      <h1 style="margin:0 0 8px;">💼 Dashboard Profissional</h1>
      <p style="color:#64748b;margin:0 0 20px;">Fase 4 — gerar QR, nota, link de reputação e últimas avaliações.</p>
      <p id="session-info" style="font-size:14px;color:#475569;"></p>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
        <a href="./selecionar-perfil.html?forceProfileSelect=true" class="btn btn-outline" style="text-align:center;text-decoration:none;">Trocar de área</a>
        <button type="button" class="btn btn-outline" onclick="resetSessionAndGoHome()">Sair</button>
        <a href="./index.html" style="text-align:center;font-size:14px;color:#6366f1;">← Início</a>
      </div>
    </div>
  </div>
  <script src="./loader.js"></script>
  <script>
    document.addEventListener('scriptsLoaded', function () {
      var session = getSession();
      if (!session || !session.userId) {
        window.location.href = './login.html?returnTo=dashboard-profissional.html';
        return;
      }
      document.getElementById('session-info').textContent =
        (session.name || 'Profissional') + (session.professionalId ? ' · vínculo ativo' : ' · sem vínculo profissional');
    });
  </script>
</body>
</html>
