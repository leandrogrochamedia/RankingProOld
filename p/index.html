<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08080f">
  <title>Ranking Pro — Perfil</title>
  <link rel="stylesheet" href="../css/ranking-pro.css">
  <script src="../js/site-paths.js"></script>
</head>
<body class="rp-shell">
  <div class="rp-container">
    <div id="rp-page-shell"></div>
    <div class="rp-card" id="app">
      <div id="state-loading" class="rp-loading">Carregando perfil</div>

      <div id="state-error" class="rp-hidden">
        <div class="rp-error-icon">⚠️</div>
        <h1 class="rp-error-title">Perfil não encontrado</h1>
        <p class="rp-message">Este profissional não existe ou o link está incorreto.</p>

      </div>

      <div id="state-profile" class="rp-hidden">
        <div class="rp-avatar" id="prof-avatar"></div>
        <h1 class="rp-prof-name" id="prof-name"></h1>
        <p class="rp-prof-specialty" id="prof-specialty"></p>

        <p class="rp-rating-big" id="rating-big">0.0</p>
        <p class="rp-rating-meta" id="rating-meta">0 avaliações</p>

        <p class="rp-logo" style="margin-top:8px;">Avaliações verificadas</p>
        <ul class="rp-reviews" id="reviews-list"></ul>
        <p class="rp-empty rp-hidden" id="reviews-empty">Ainda sem avaliações verificadas</p>
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/site-nav.js"></script>
  <script src="../js/page-shell.js"></script>
  <script src="../js/profile-service.js"></script>
  <script>
    (async function () {
      const loading = document.getElementById('state-loading');
      const errorBlock = document.getElementById('state-error');
      const profileBlock = document.getElementById('state-profile');
      const profAvatar = document.getElementById('prof-avatar');
      const profName = document.getElementById('prof-name');
      const profSpecialty = document.getElementById('prof-specialty');
      const ratingBig = document.getElementById('rating-big');
      const ratingMeta = document.getElementById('rating-meta');
      const reviewsList = document.getElementById('reviews-list');
      const reviewsEmpty = document.getElementById('reviews-empty');

      const profId = new URLSearchParams(window.location.search).get('id');

      function hideAll() {
        loading.classList.add('rp-hidden');
        errorBlock.classList.add('rp-hidden');
        profileBlock.classList.add('rp-hidden');
      }

      function initials(name) {
        return String(name || '?').split(/\s+/).slice(0, 2).map(function (w) {
          return w[0] || '';
        }).join('').toUpperCase();
      }

      if (!profId) {
        hideAll();
        errorBlock.classList.remove('rp-hidden');
        return;
      }

      try {
        const prof = await RankingProProfile.getProfessionalById(profId);
        if (!prof) {
          hideAll();
          errorBlock.classList.remove('rp-hidden');
          return;
        }

        const reviews = await RankingProProfile.getReviewsForProfessional(prof.id);
        const verifiedReviews = (reviews || []).filter(RankingProProfile.isReviewVerified);

        hideAll();
        profileBlock.classList.remove('rp-hidden');

        if (prof.avatar_url) {
          profAvatar.innerHTML = '<img src="' + escapeAttr(prof.avatar_url) + '" alt="">';
        } else {
          profAvatar.textContent = initials(prof.name);
        }

        profName.textContent = prof.name;
        profSpecialty.textContent = prof.specialty || '';
        profSpecialty.style.display = prof.specialty ? 'block' : 'none';

        const avg = Number(prof.avg_rating) || 0;
        ratingBig.textContent = avg.toFixed(1);
        ratingMeta.textContent = RankingProProfile.formatRatingDisplay(avg, prof.total_reviews);

        if (!verifiedReviews.length) {
          reviewsEmpty.classList.remove('rp-hidden');
          return;
        }

        reviewsEmpty.classList.add('rp-hidden');
        reviewsList.innerHTML = verifiedReviews.map(function (r) {
          const stars = RankingProProfile.renderStars(r.rating);
          const comment = r.comment
            ? '<p class="rp-review-comment">' + escapeHtml(r.comment) + '</p>'
            : '';
          const date = RankingProProfile.formatRelativeDate(r.created_at);

          return (
            '<li class="rp-review-item">' +
              '<div class="rp-review-stars">' + stars +
                '<span class="rp-verified-badge">Verificada</span>' +
              '</div>' +
              comment +
              '<p class="rp-review-date">' + escapeHtml(date) + '</p>' +
            '</li>'
          );
        }).join('');
      } catch (err) {
        console.error(err);
        hideAll();
        errorBlock.classList.remove('rp-hidden');
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(str) {
        return escapeHtml(str).replace(/'/g, '&#39;');
      }
    })();
  </script>
</body>
</html>
